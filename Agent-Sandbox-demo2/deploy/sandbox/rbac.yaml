apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-manager-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-manager-role
  namespace: demo-pods

rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - events
  verbs:
    - get
    - list
    - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-configmap-role
  namespace: demo-pods

rules:
- apiGroups: [""]
  resources:
    - configmaps
  verbs:
    - get
    - list
    - create
    - update
    - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-manager-binding
  namespace: demo-pods

subjects:
- kind: ServiceAccount
  name: agent-manager-sa
  namespace: default

roleRef:
  kind: Role
  name: agent-manager-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-configmap-binding
  namespace: demo-pods

subjects:
- kind: ServiceAccount
  name: agent-manager-sa
  namespace: default

roleRef:
  kind: Role
  name: agent-configmap-role
  apiGroup: rbac.authorization.k8s.io